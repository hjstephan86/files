name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    
    steps:
    # Latest v4+ with Node.js 24 support
    - uses: actions/checkout@v4
    
    # Upgraded to v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    # Upgraded to v4
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    # Upgraded to v3 with correct parameters
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12.0'
        packages: 'platforms;android-34 build-tools;34.0.0'
        accept-android-sdk-licenses: true
    
    # Note: If your project uses newer Capacitor versions, you might want 
    # to consider updating Node.js to v20+ in the future.
    - name: Install dependencies
      run: npm install
    
    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Build APK
      working-directory: ./android
      run: chmod +x gradlew && ./gradlew assembleDebug
    
    # FIX: Upgraded to v4 to resolve the deprecation error
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30